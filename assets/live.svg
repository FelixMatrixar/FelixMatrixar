<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" role="img" aria-label="live">
<style>
.ring{animation:ring 2.2s cubic-bezier(.22,1,.36,1) infinite}
@keyframes ring{0%{r:4;opacity:.9}70%{r:7.4;opacity:0}100%{r:7.4;opacity:0}}
@media (prefers-reduced-motion:reduce){*{animation:none !important}}
</style>
<circle cx="8" cy="8" r="4" fill="#34D17E"/>
<circle class="ring" cx="8" cy="8" r="4" fill="none" stroke="#34D17E" stroke-width="1.4"/>
</svg>
